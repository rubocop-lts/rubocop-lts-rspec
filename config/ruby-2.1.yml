# We want "Exclude" and "Include" directives from different
#   config files to get merged, not overwritten
inherit_mode:
  merge:
    - Exclude
    - Include

plugins:
  - rubocop-rspec-extra
  - rubocop-rspec

require:
  - rubocop-lts-rspec
  - rubocop-env

inherit_gem:
  rubocop-env: config/default.yml
  rubocop-rspec-extra: config/default.yml

inherit_from:
  - ./base.yml
  - ./internal/ruby-2.1.yml
